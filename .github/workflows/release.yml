name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Windows
        run: bun build ./src/node.ts --compile --target=bun-windows-x64 --outfile=cookie-server-windows.exe

      - name: Build Linux
        run: bun build ./src/node.ts --compile --target=bun-linux-x64 --outfile=cookie-server-linux

      - name: Build macOS (Intel)
        run: bun build ./src/node.ts --compile --target=bun-darwin-x64 --outfile=cookie-server-macos-x64

      - name: Build macOS (Apple Silicon)
        run: bun build ./src/node.ts --compile --target=bun-darwin-arm64 --outfile=cookie-server-macos-arm

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cookie-server-windows.exe
            cookie-server-linux
            cookie-server-macos-x64
            cookie-server-macos-arm
