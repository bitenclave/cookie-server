databases:
  - name: cookie-editor-db
    plan: free

services:
  - type: web
    name: cookie-editor-server
    env: node
    plan: free
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_AUTO_MIGRATE
        value: true
      - key: CORS_ORIGIN
        value: "*"
      - key: AUTH_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cookie-editor-db
          property: connectionString
