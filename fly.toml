app = "cookie-editor-server"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_AUTO_MIGRATE = "true"
  CORS_ORIGIN = "*"
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
